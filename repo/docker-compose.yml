services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    env_file:
      - ./.env.qa
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 12
    networks:
      - app_net

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    env_file:
      - ./.env.qa
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - app_net
    command: ["redis-server", "--appendonly", "yes"]

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    restart: unless-stopped
    env_file:
      - ./.env.qa
    environment:
      AUTH_COOKIE_SECURE: ${AUTH_COOKIE_SECURE:-false}
      TRUST_PROXY: ${TRUST_PROXY:-false}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:5173}
    ports:
      - "4000:4000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:4000/health/ready').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"
        ]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s
    networks:
      - app_net

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    restart: unless-stopped
    env_file:
      - ./.env.qa
    environment:
      PUBLIC_API_BASE_URL: ${PUBLIC_API_BASE_URL:-http://localhost:4000/api/v1}
      API_INTERNAL_BASE_URL: ${API_INTERNAL_BASE_URL:-http://backend:4000/api/v1}
    ports:
      - "5173:5173"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:5173').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"
        ]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s
    networks:
      - app_net

  tests:
    image: node:20-alpine
    restart: "no"
    working_dir: /workspace
    env_file:
      - ./.env.qa
    environment:
      REAL_INTEGRATION_BASE_URL: http://backend:4000
      REAL_INTEGRATION_DATABASE_URL: postgresql://culinary_user:culinary_password@postgres:5432/culinary_studio?schema=public
      DATABASE_URL: postgresql://culinary_user:culinary_password@postgres:5432/culinary_studio?schema=public
      REDIS_URL: redis://redis:6379
    volumes:
      - .:/workspace
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_healthy
    command:
      [
        "sh",
        "-lc",
        "npm ci --workspace backend --workspace frontend --include-workspace-root=false && ./run_tests.sh"
      ]
    networks:
      - app_net

  caddy:
    image: caddy:2-alpine
    restart: "no"
    profiles: ["tls"]
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./infra/tls/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_healthy
    networks:
      - app_net

volumes:
  pg_data:
  redis_data:
  caddy_data:
  caddy_config:

networks:
  app_net:
    driver: bridge
